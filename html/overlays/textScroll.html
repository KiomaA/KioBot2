<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Scroll</title>
</head>
<style>
    body{
        font-family: '宇文天穹';
        text-shadow:
            3px 3px 0 #000,
            -3px 3px 0 #000,
            -3px -3px 0 #000,
            3px -3px 0 #000;
    }

    .marquee-container {
      width: 100%;
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .marquee-content {
      display: inline-block;
      white-space: nowrap;
      font-size: 48px;
      animation: marquee 5s linear infinite;
    }

    #inqueue, #queue{
        font-size: 64px;
    }

    @keyframes marquee {
      0% {
        transform: translateX(100vw);
      }
      100% {
        transform: translateX(calc(-100vw - 100%));
      } 
    }
</style>
<body>
    <div class="marquee-container">
      <div class="marquee-content" id="message">
        Hello World!
      </div>
    </div>
</body>
<script src="/overlays/js/socket.io.min.js"></script>
<script>
    const socket = io("localhost:3000");
    let enabled = true;

    socket.on('connect',()=>{
        socket.emit('textScroll',{update:true});
    })

    socket.on('textScroll',(message)=>{
        if (message.disable){
            document.querySelector(".marquee-content").style.animation = "none";
            document.querySelector("#message").innerHTML = "";
            enabled = false;
            return;
        }

        if (message.enable){
            enabled = true;
        }

        if (message.message && enabled){
            document.querySelector("#message").innerHTML = message.message;
            document.querySelector(".marquee-content").style.animation = "none";
            document.querySelector(".marquee-content").style.animation = `marquee ${message.message.length > 30 ? message.message.length * 0.2 : 5}s linear infinite`;
        }
    })
</script>
</html>
